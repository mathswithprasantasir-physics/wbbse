<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prasanta Sir's Science - Class 10 WBBSE</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container-fluid">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="#">
                    <i class="bi bi-flask"></i> Prasanta Sir's Science
                </a>
                <div class="ms-auto">
                    <span class="badge bg-light text-dark">Class 10 WBBSE</span>
                </div>
            </div>
        </nav>

        <div class="row mt-3">
            <!-- Sidebar - Filters -->
            <div class="col-md-3">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5><i class="bi bi-funnel"></i> Filters</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Subject</label>
                            <select id="subjectFilter" class="form-select">
                                <option value="">All Subjects</option>
                                <option value="physics">Physics</option>
                                <option value="chemistry">Chemistry</option>
                                <option value="biology">Biology</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Chapter</label>
                            <select id="chapterFilter" class="form-select">
                                <option value="">All Chapters</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Question Type</label>
                            <select id="typeFilter" class="form-select">
                                <option value="">All Types</option>
                                <option value="mcqs">MCQs</option>
                                <option value="true_false">True/False</option>
                                <option value="fill_blanks">Fill in the Blanks</option>
                                <option value="match_column">Match Column</option>
                                <option value="vsaq">1 Mark</option>
                                <option value="saq">2 Marks</option>
                                <option value="laq">3 Marks</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Marks</label>
                            <select id="marksFilter" class="form-select">
                                <option value="">All Marks</option>
                                <option value="1">1 Mark</option>
                                <option value="2">2 Marks</option>
                                <option value="3">3 Marks</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Topic</label>
                            <select id="topicFilter" class="form-select">
                                <option value="">All Topics</option>
                            </select>
                        </div>
                        
                        <button id="applyFilters" class="btn btn-primary w-100">
                            <i class="bi bi-search"></i> Apply Filters
                        </button>
                        <button id="resetFilters" class="btn btn-outline-secondary w-100 mt-2">
                            <i class="bi bi-arrow-counterclockwise"></i> Reset
                        </button>
                    </div>
                </div>
                
                <div class="card shadow-sm mt-3">
                    <div class="card-header bg-success text-white">
                        <h5><i class="bi bi-graph-up"></i> Statistics</h5>
                    </div>
                    <div class="card-body" id="statsContainer">
                        <p>Loading statistics...</p>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9">
                <div class="card shadow-sm">
                    <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                        <h5><i class="bi bi-question-circle"></i> Questions</h5>
                        <div>
                            <span id="questionCount" class="badge bg-light text-dark me-2">0 questions</span>
                            <button id="showAnswersBtn" class="btn btn-light btn-sm">
                                <i class="bi bi-eye"></i> Show Answers
                            </button>
                            
                        </div>
                    </div>
                    <div class="card-body" id="questionsContainer">
                        <div class="text-center text-muted py-5">
                            <i class="bi bi-inbox display-1"></i>
                            <p>Select filters to view questions</p>
                        </div>
                    </div>
                    <div class="card-footer" id="paginationContainer">
                        <nav>
                            <ul class="pagination justify-content-center" id="pagination">
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
